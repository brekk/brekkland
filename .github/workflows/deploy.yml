name: Pages Deploy 🚀

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: astro
        uses: withastro/action@v6
        with:
          path: .
          node-version: 24
          package-manager: bun@latest
          build-cmd: bun run build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to GH Pages
        id: deployment
        uses: actions/deploy-pages@v5

